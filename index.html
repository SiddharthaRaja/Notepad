<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Notepad</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Notepad">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23111'/%3E%3Ctext x='50' y='62' font-size='46' text-anchor='middle' fill='white' font-family='sans-serif'%3EN%3C/text%3E%3C/svg%3E">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="rhymes.js" defer></script>
<script src="synonyms.js" defer></script>
<style>
:root{
  --bg:#0d0d0d; --panel:#161616; --panel2:#1e1e1e; --text:#f2f2f2; --muted:#9a9a9a;
  --accent:#3b5bfd; --accent-text:#ffffff; --border:#2a2a2a; --danger:#e5484d;
}
[data-theme="light"]{ --bg:#f6f6f6; --panel:#ffffff; --panel2:#f0f0f0; --text:#111111; --muted:#6b6b6b; --accent:#3b5bfd; --accent-text:#fff; --border:#e2e2e2; }
[data-theme="dark"]{ --bg:#000000; --panel:#0f0f0f; --panel2:#181818; --text:#f2f2f2; --muted:#9a9a9a; --accent:#4a4a4a; --accent-text:#fff; --border:#262626; }
[data-theme="blue"]{ --bg:#0a0e1a; --panel:#101731; --panel2:#16204a; --text:#eaf0ff; --muted:#93a3c9; --accent:#3d6bff; --accent-text:#fff; --border:#233158; }
[data-theme="green"]{ --bg:#08130d; --panel:#0e1f15; --panel2:#132c1c; --text:#eafff2; --muted:#8fb8a2; --accent:#1f9d55; --accent-text:#fff; --border:#1e3427; }
[data-theme="purple"]{ --bg:#120c1a; --panel:#1c1329; --panel2:#271a38; --text:#f3eaff; --muted:#b09fcf; --accent:#7c3aed; --accent-text:#fff; --border:#332349; }
[data-theme="slate"]{ --bg:#0f1214; --panel:#171b1e; --panel2:#1f2428; --text:#eef1f2; --muted:#93a1a8; --accent:#475569; --accent-text:#fff; --border:#282e33; }
[data-theme="amber"]{ --bg:#fbf3e0; --panel:#fffaf0; --panel2:#f7ecd0; --text:#3a2c0f; --muted:#8a7a4d; --accent:#c98a12; --accent-text:#fff; --border:#e9d9ab; }
[data-theme="rose"]{ --bg:#170a0d; --panel:#241014; --panel2:#33161c; --text:#ffeaec; --muted:#c99ba1; --accent:#c2255c; --accent-text:#fff; --border:#3d1b21; }
[data-theme="cyan"]{ --bg:#061618; --panel:#0b2327; --panel2:#103038; --text:#e6fbff; --muted:#8fb9bf; --accent:#0891b2; --accent-text:#fff; --border:#173c42; }
[data-theme="teal"]{ --bg:#061814; --panel:#0b2621; --panel2:#10332c; --text:#e6fff8; --muted:#8fbfb0; --accent:#0d9488; --accent-text:#fff; --border:#173e36; }
[data-theme="indigo"]{ --bg:#0b0c1c; --panel:#131530; --panel2:#1a1d42; --text:#ecebff; --muted:#a29fd6; --accent:#4f46e5; --accent-text:#fff; --border:#242760; }

*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0; background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom);
  -webkit-tap-highlight-color:transparent;
}
button{font-family:inherit; cursor:pointer;}
input,textarea{font-family:inherit;}
.app{max-width:900px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

/* Top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);gap:8px;position:sticky;top:0;background:var(--bg);z-index:5;flex-wrap:wrap;}
.topbar h1{font-size:19px;margin:0;font-weight:700;letter-spacing:.2px;display:flex;align-items:center;gap:8px;}
.icon-btn{background:none;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 9px;display:flex;align-items:center;justify-content:center;}
.icon-btn:active{opacity:.6;}
.iconrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}

/* View containers: exactly one of these two is visible at a time */
.view{display:none;flex-direction:column;flex:1;}
.view.active{display:flex;}

/* Home */
.home-body{padding:16px;flex:1;}
.new-row{display:flex;gap:8px;margin-bottom:18px;}
.new-row input{flex:1;background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px 14px;font-size:15px;outline:none;}
.new-row input:focus{border-color:var(--accent);}
.btn-primary{background:var(--accent);color:var(--accent-text);border:none;border-radius:10px;padding:0 18px;font-weight:600;font-size:14px;display:flex;align-items:center;gap:6px;}
.btn-primary:active{opacity:.8;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;position:relative;}
.card:active{opacity:.75;}
.card h3{margin:6px 0 4px;font-size:15px;font-weight:600;}
.card .meta{color:var(--muted);font-size:12.5px;}
.card .file-icon{opacity:.85;}
.empty{color:var(--muted);text-align:center;padding:60px 20px;font-size:14px;}
.card .del{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--muted);padding:4px;border-radius:6px;}
.card .del:active{color:var(--danger);}
.card .edit{position:absolute;top:8px;right:34px;background:none;border:none;color:var(--muted);padding:4px;border-radius:6px;}
.card .edit:active{color:var(--accent);}
.danger-text{color:var(--danger);font-weight:600;}
.confirm-input{width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 12px;font-size:14px;outline:none;margin-top:8px;}
.row button.danger{background:var(--danger);color:#fff;border-color:var(--danger);}
.row button:disabled{opacity:.4;}

/* Editor */
.ed-top{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-bottom:1px solid var(--border);gap:6px;position:sticky;top:0;background:var(--bg);z-index:5;flex-wrap:wrap;}
.ed-title-row{display:flex;align-items:center;gap:6px;min-width:0;flex:1;}
.ed-title-row .back{background:none;border:none;color:var(--text);font-size:18px;padding:2px;}
.ed-title{font-weight:700;font-size:14.5px;background:none;border:none;color:var(--text);outline:none;flex:1;min-width:0;}
.viewtabs{display:flex;background:var(--panel2);border-radius:7px;padding:1px;max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.viewtabs::-webkit-scrollbar{display:none;}
.viewtabs button{background:none;border:none;color:var(--muted);font-size:11.5px;padding:4px 8px;border-radius:5px;font-weight:600;flex:0 0 auto;white-space:nowrap;}
.viewtabs button.active{background:var(--accent);color:var(--accent-text);}
.ed-top .iconrow{min-width:0;flex:1 1 auto;justify-content:flex-end;gap:5px;}
.ed-top .icon-btn{padding:5px 7px;font-size:13px;}

.sectiontabs{display:flex;gap:5px;padding:6px 10px;overflow-x:auto;border-bottom:1px solid var(--border);}
.sectiontabs::-webkit-scrollbar{display:none;}
.stab{flex:0 0 auto;background:var(--panel2);border:1px solid var(--border);color:var(--muted);padding:4px 9px;border-radius:7px;font-size:12px;white-space:nowrap;font-weight:600;}
.stab.active{background:var(--accent);color:var(--accent-text);border-color:var(--accent);}
.stab.add{color:var(--accent);}
.stab{touch-action:pan-y;user-select:none;}
.stab.dragging{opacity:.35;}
.stab.drag-ghost{position:fixed;pointer-events:none;z-index:50;box-shadow:0 4px 14px rgba(0,0,0,.4);}

.sec-body{padding:8px 10px;flex:1;display:flex;flex-direction:column;}
.sec-headrow{display:flex;gap:6px;align-items:center;margin-bottom:6px;}
.sec-name{flex:1;background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 9px;font-size:13px;outline:none;}
.togglegrp{display:flex;background:var(--panel2);border-radius:7px;padding:1px;}
.togglegrp button{background:none;border:none;color:var(--muted);padding:5px 9px;font-size:11px;border-radius:5px;font-weight:600;}
.togglegrp button.active{background:var(--accent);color:var(--accent-text);}
.trash{background:none;border:none;color:var(--muted);padding:5px;font-size:13px;}
.trash:active{color:var(--danger);}
textarea.sec-content{flex:1;min-height:40vh;background:transparent;border:none;color:var(--text);font-size:15.5px;line-height:1.7;outline:none;resize:none;padding:4px 0;}

.fullview{padding:16px;white-space:pre-wrap;font-size:15.5px;line-height:1.8;flex:1;}
.fullview .fsec{margin-bottom:22px;}
.fullview .fsec h4{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.06em;margin:0 0 6px;}

.savebar{padding:8px 16px;font-size:11.5px;color:var(--muted);text-align:right;}

.hidden{display:none !important;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:20;}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:18px;width:100%;max-width:900px;max-height:70vh;overflow-y:auto;}
.modal h3{margin-top:0;}
.modal .row{display:flex;gap:10px;margin-bottom:10px;}
.modal .row button{flex:1;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px;font-size:14px;font-weight:600;}
.themeswatch{width:16px;height:16px;border-radius:50%;display:inline-block;margin-right:8px;vertical-align:middle;border:1px solid var(--border);}
.themegrid{display:flex;flex-direction:column;gap:6px;}
.themegrid button{display:flex;align-items:center;justify-content:flex-start;text-align:left;}

.sync-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);padding:2px 4px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex:0 0 auto;}
.sync-dot.ok{background:#2ecc71;}
.sync-dot.busy{background:#f4b740;}
.sync-dot.err{background:var(--danger);}
.avatar{width:26px;height:26px;border-radius:50%;object-fit:cover;border:1px solid var(--border);}
.settings-field{margin-bottom:12px;}
.settings-field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:5px;}
.settings-field input{width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 12px;font-size:13.5px;outline:none;}
.settings-note{font-size:12px;color:var(--muted);line-height:1.5;margin-top:4px;}
.settings-note a{color:var(--accent);}

.rhymes-pane{padding:14px 16px;flex:1;overflow-y:auto;}
.rhyme-search{width:100%;background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px 14px;font-size:15px;outline:none;margin-bottom:6px;}
.rhyme-search:focus{border-color:var(--accent);}
.rhyme-toolbar{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap;}
.rhyme-toolbar button{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 12px;font-size:12.5px;font-weight:600;}
.rhyme-toolbar button.active{background:var(--accent);color:var(--accent-text);border-color:var(--accent);}
.rhyme-status{color:var(--muted);font-size:13px;padding:20px 0;text-align:center;}
.rhyme-group{margin-bottom:20px;}
.rhyme-group h4{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:0 0 8px;display:flex;align-items:center;gap:6px;}
.rhyme-chips{display:flex;flex-wrap:wrap;gap:8px;}
.rhyme-chip{background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:999px;padding:7px 13px;font-size:14px;}
.rhyme-chip:active{background:var(--accent);color:var(--accent-text);border-color:var(--accent);}
.family-list{display:flex;flex-direction:column;gap:6px;}
.family-item{display:flex;justify-content:space-between;align-items:center;background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 12px;font-size:13.5px;text-align:left;}
.family-item .fam-count{color:var(--muted);font-size:12px;}

.sec-content-wrap{position:relative;flex:1;display:flex;}
textarea.sec-content{padding-right:38px;}
.syllable-gutter{position:absolute;top:4px;right:6px;bottom:4px;width:30px;pointer-events:none;overflow:hidden;text-align:right;}
.syllable-gutter .sg-line{font-size:11.5px;color:var(--muted);opacity:.55;white-space:nowrap;}

.pos-label{display:inline-block;background:var(--panel2);color:var(--muted);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 6px;border-radius:5px;margin-right:6px;}

.icon{width:16px;height:16px;vertical-align:middle;flex:0 0 auto;}
h1 .icon{width:18px;height:18px;}
.card .file-icon .icon{width:20px;height:20px;color:var(--muted);}
.card .edit .icon,.card .del .icon{width:14px;height:14px;}
.trash .icon{width:14px;height:14px;}
</style>
</head>

  <symbol id="i-gear" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></symbol>
  <symbol id="i-theme" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 000 18z" fill="currentColor" stroke="none"/></symbol>
  <symbol id="i-download" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></symbol>
  <symbol id="i-upload" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></symbol>

<div class="app">

  <!-- HOME -->
  <div class="view active" id="homeView">
    <div class="topbar">
      <h1><svg class="icon"><use href="#i-file"/></svg> Notepad</h1>
      <div class="iconrow">
        <span class="sync-status" id="syncStatus"><span class="sync-dot" id="syncDot"></span><span id="syncText">Offline</span></span>
        <button class="icon-btn" id="signInBtn" title="Sign in with Google">Sign in</button>
        <button class="icon-btn hidden" id="signOutBtn" title="Sign out"><img class="avatar" id="userAvatar" src="" alt=""></button>
        <button class="icon-btn" id="settingsBtn" title="Sync settings"><svg class="icon"><use href="#i-gear"/></svg></button>
        <button class="icon-btn" id="themeBtn" title="Theme"><svg class="icon"><use href="#i-theme"/></svg></button>
        <button class="icon-btn" id="backupBtn" title="Backup / Export all"><svg class="icon"><use href="#i-download"/></svg></button>
        <button class="icon-btn" id="restoreBtn" title="Restore from backup"><svg class="icon"><use href="#i-upload"/></svg></button>
      </div>
    </div>
    <div class="home-body">
      <div class="new-row">
        <input id="newTitle" placeholder="New song title..." maxlength="120">
        <button class="btn-primary" id="createBtn">+ Create</button>
      </div>
      <div class="grid" id="songGrid"></div>
      <div class="empty hidden" id="emptyMsg">No songs yet. Create your first one above.</div>
    </div>
    <input type="file" id="fileInput" accept="application/json" class="hidden">
  </div>

  <!-- EDITOR -->
  <div class="view" id="editorView">
    <div class="ed-top">
      <div class="ed-title-row">
        <button class="back" id="backBtn">←</button>
        <input class="ed-title" id="edTitle" maxlength="120">
      </div>
      <div class="iconrow">
        <button class="icon-btn" id="exportSongBtn" title="Export this song as text"><svg class="icon"><use href="#i-download"/></svg></button>
        <div class="viewtabs">
          <button id="tabSections" class="active">Sections</button>
          <button id="tabFull">Full</button>
          <button id="tabRhymes">Rhymes</button>
          <button id="tabSynonyms">Synonyms</button>
        </div>
      </div>
    </div>

    <div id="sectionsPane">
      <div class="sectiontabs" id="sectionTabs"></div>
      <div class="sec-body" id="sectionBody"></div>
    </div>

    <div id="fullPane" class="fullview hidden"></div>

    <div id="rhymesPane" class="rhymes-pane hidden">
      <input class="rhyme-search" id="rhymeSearch" placeholder="Type a word to find rhymes…" autocomplete="off">
      <div class="rhyme-toolbar">
        <button id="rhymeBrowseBtn">Browse rhyme families</button>
      </div>
      <div id="rhymeResults"></div>
    </div>

    <div id="synonymsPane" class="rhymes-pane hidden">
      <input class="rhyme-search" id="synonymSearch" placeholder="Type a word to find synonyms…" autocomplete="off">
      <div id="synonymResults"></div>
    </div>

    <div class="savebar" id="saveStatus">Saved</div>
  </div>

</div>

<script>
(function(){
  "use strict";
  const STORAGE_KEY = "notepad_songs_v1";
  const THEME_KEY = "notepad_theme_v1";
  const THEMES = ["dark","light","blue","green","purple","slate","amber","rose","cyan","teal","indigo"];

  let songs = load();
  let currentSongId = null;
  let currentSectionId = null;
  let saveTimer = null;

  // ---------- persistence ----------
  function load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch(e){ console.error("load failed", e); return []; }
  }
  function persist(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(songs));
      setSaveStatus("Saved " + new Date().toLocaleTimeString());
    }catch(e){
      setSaveStatus("Save FAILED — storage full?");
      console.error(e);
    }
  }
  function scheduleSave(){
    setSaveStatus("Saving…");
    clearTimeout(saveTimer);
    saveTimer = setTimeout(()=>{ persist(); scheduleCloudSync(); }, 250);
  }
  function setSaveStatus(t){
    const el = document.getElementById("saveStatus");
    if(el) el.textContent = t;
  }
  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

  // ---------- theme ----------
  function applyTheme(t){
    document.body.setAttribute("data-theme", t);
    localStorage.setItem(THEME_KEY, t);
  }
  applyTheme(localStorage.getItem(THEME_KEY) || "dark");

  // ---------- home rendering ----------
  const songGrid = document.getElementById("songGrid");
  const emptyMsg = document.getElementById("emptyMsg");

  function renderHome(){
    songGrid.innerHTML = "";
    if(songs.length === 0){ emptyMsg.classList.remove("hidden"); }
    else { emptyMsg.classList.add("hidden"); }
    songs.slice().sort((a,b)=>b.updatedAt-a.updatedAt).forEach(song=>{
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="file-icon"><svg class="icon"><use href="#i-file"/></svg></div>
        <h3></h3>
        <div class="meta"></div>

  // ---------- drag-to-reorder sections (long-press, works for touch + mouse) ----------
  const LONGPRESS_MS = 280;
  const MOVE_CANCEL_PX = 10;
  function attachDragReorder(tabEl, secId){
    let pressTimer = null;
    let startX = 0, startY = 0;
    let dragging = false;
    let ghost = null;

    tabEl.addEventListener("pointerdown", (e)=>{
      if(e.button !== undefined && e.button !== 0) return;
      startX = e.clientX; startY = e.clientY;
      dragging = false;
      clearTimeout(pressTimer);
      pressTimer = setTimeout(()=>beginDrag(e), LONGPRESS_MS);
    });
    tabEl.addEventListener("pointermove", (e)=>{
      if(!dragging){
        if(Math.abs(e.clientX-startX) > MOVE_CANCEL_PX || Math.abs(e.clientY-startY) > MOVE_CANCEL_PX){
          clearTimeout(pressTimer);
        }
        return;
      }
      moveDrag(e);
    });
    tabEl.addEventListener("pointerup", endDrag);
    tabEl.addEventListener("pointercancel", endDrag);
    tabEl.addEventListener("pointerleave", (e)=>{
      if(!dragging) clearTimeout(pressTimer);
    });

    function beginDrag(e){
      dragging = true;
      tabEl.dataset.suppressClick = "1";
      tabEl.classList.add("dragging");
      try{ tabEl.setPointerCapture(e.pointerId); }catch(err){}
      ghost = tabEl.cloneNode(true);
      ghost.classList.add("drag-ghost");
      ghost.classList.remove("dragging");
      const r = tabEl.getBoundingClientRect();
      ghost.style.width = r.width + "px";
      ghost.style.left = r.left + "px";
      ghost.style.top = r.top + "px";
      document.body.appendChild(ghost);
      if(navigator.vibrate) navigator.vibrate(15);
    }
    function moveDrag(e){
      if(!ghost) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      const r0 = tabEl.getBoundingClientRect();
      ghost.style.left = (r0.left + dx) + "px";
      ghost.style.top = (r0.top + dy) + "px";

      const tabs = [...sectionTabs.querySelectorAll(".stab:not(.add)")];
      const overEl = tabs.find(t=>{
        if(t===tabEl) return false;
        const r = t.getBoundingClientRect();
        return e.clientX >= r.left && e.clientX <= r.right;
      });
      if(overEl){
        const fromIdx = tabs.indexOf(tabEl);
        const toIdx = tabs.indexOf(overEl);
        if(fromIdx !== toIdx){
          if(fromIdx < toIdx){ sectionTabs.insertBefore(tabEl, overEl.nextSibling); }
          else { sectionTabs.insertBefore(tabEl, overEl); }
          syncSectionOrderFromDOM();
        }
      }
    }
    function endDrag(e){
      clearTimeout(pressTimer);
      if(!dragging) return;
      dragging = false;
      if(ghost){ ghost.remove(); ghost = null; }
      tabEl.classList.remove("dragging");
      scheduleSave();
    }
  }

  function downloadFile(filename, content, mime){

  function sanitizeFilename(s){ return s.replace(/[^a-z0-9\-_ ]/gi,"").trim().slice(0,60) || "song"; }

  // ================= RHYME DICTIONARY (offline, ~126k words) =================
  const RHYME_RESULT_LIMIT = 100;
  let rhymesPaneInited = false;

  function rhymeVowelOf(rime){ return rime.split(" ")[0]; }
  function rhymeTrailMatch(a, b){
    const pa = a.split(" "), pb = b.split(" ");
    let i=pa.length-1, j=pb.length-1, n=0;
    while(i>=0 && j>=0 && pa[i]===pb[j]){ n++; i--; j--; }
    return n;
  }

  function findRhymes(query){
    const data = window.RHYME_DATA;
    if(!data) return null;
    const { W, R } = data;
    const q = query.trim().toLowerCase();
    if(!q) return null;
    const idx = W.indexOf(q);
    if(idx === -1) return { notFound: true };
    const qRime = R[idx];
    const qVowel = rhymeVowelOf(qRime);
    const perfect=[], near=[], slant=[];
    for(let i=0;i<W.length;i++){
      if(i===idx) continue;
      const w = W[i];
      if(w.length<3) continue;
      const r = R[i];
      if(r === qRime){ perfect.push(w); continue; }
      const tm = rhymeTrailMatch(qRime, r);
      const v = rhymeVowelOf(r);
      if(v === qVowel){ near.push([w,tm]); continue; }
      if(tm>=1){ slant.push([w,tm]); continue; }
    }
    const uniqSimple = a => [...new Set(a)].sort((x,y)=>x.length-y.length || x.localeCompare(y));
    const sortScored = a => [...new Set(a.map(x=>x[0]))]
      .map(w=>[w, Math.max(...a.filter(p=>p[0]===w).map(p=>p[1]))])
      .sort((x,y)=> y[1]-x[1] || x[0].length-y[0].length || x[0].localeCompare(y[0]))
      .map(x=>x[0]);
    return {
      perfect: uniqSimple(perfect).slice(0, RHYME_RESULT_LIMIT),
      near: sortScored(near).slice(0, RHYME_RESULT_LIMIT),
      slant: sortScored(slant).slice(0, RHYME_RESULT_LIMIT)
    };
  }

  function wordsForFamily(rimeKey){
    const data = window.RHYME_DATA;
    if(!data) return [];
    const { W, R } = data;
    const out = [];
    for(let i=0;i<W.length;i++){
      if(R[i]===rimeKey && W[i].length>=3) out.push(W[i]);
    }
    return [...new Set(out)].sort((a,b)=>a.length-b.length || a.localeCompare(b)).slice(0, RHYME_RESULT_LIMIT);
  }

  function insertWordIntoLyrics(word){
    const song = currentSong();
    if(!song) return;
    const sec = song.sections.find(s=>s.id===currentSectionId);
    if(!sec){ alert("Open a section first (in the Sections tab) to insert words into it."); return; }
    sec.content = sec.content ? (sec.content.replace(/\s+$/,"") + " " + word) : word;
    song.updatedAt = Date.now();
    scheduleSave();
    const contentEl = document.getElementById("secContent");

  function renderRhymeGroup(container, label, words, emptyNote){

      });

  }

  const RHYME_LOAD_TIMEOUT_MS = 15000;
  let rhymeLoadStartedAt = null;
  function rhymeLoadFailedHTML(){
    return `<div class="rhyme-status">Couldn't load the rhyme dictionary (rhymes.js). It may be missing from your hosting, misnamed, or your connection is too slow.<br><br><button id="rhymeRetryBtn">Retry</button></div>`;
  }
  function wireRetryButton(onRetry){
    const btn = document.getElementById("rhymeRetryBtn");
    if(btn) btn.addEventListener("click", ()=>{ rhymeLoadStartedAt = null; onRetry(); });
  }

  function runRhymeSearch(query){
    const results = document.getElementById("rhymeResults");
    results.innerHTML = "";
    if(!window.RHYME_DATA){
      if(rhymeLoadStartedAt === null) rhymeLoadStartedAt = Date.now();
      if(Date.now() - rhymeLoadStartedAt > RHYME_LOAD_TIMEOUT_MS){
        results.innerHTML = rhymeLoadFailedHTML();
        wireRetryButton(()=>runRhymeSearch(query));
        return;
      }
      results.innerHTML = `<div class="rhyme-status">Loading rhyme dictionary…</div>`;
      setTimeout(()=>{ if(document.getElementById("rhymeSearch").value.trim().toLowerCase()===query.trim().toLowerCase()) runRhymeSearch(query); }, 400);
      return;
    }
    rhymeLoadStartedAt = null;
    if(!query.trim()){ results.innerHTML = ""; return; }
    const res = findRhymes(query);
    if(res.notFound){
      results.innerHTML = `<div class="rhyme-status">"${query.trim()}" isn't in the dictionary. Check the spelling, or try a simpler/base form of the word.</div>`;
      return;
    }
    renderRhymeGroup(results, "Perfect rhymes", res.perfect, "No perfect rhymes exist for this word in English — try Near or Slant below.");
    renderRhymeGroup(results, "Near rhymes", res.near, "");
    renderRhymeGroup(results, "Slant / far rhymes", res.slant, "");
  }

  function renderFamilyBrowser(){
    const results = document.getElementById("rhymeResults");
    results.innerHTML = "";
    if(!window.RHYME_DATA){
      if(rhymeLoadStartedAt === null) rhymeLoadStartedAt = Date.now();
      if(Date.now() - rhymeLoadStartedAt > RHYME_LOAD_TIMEOUT_MS){
        results.innerHTML = rhymeLoadFailedHTML();
        wireRetryButton(renderFamilyBrowser);
        return;
      }
      results.innerHTML = `<div class="rhyme-status">Loading rhyme dictionary…</div>`;
      setTimeout(renderFamilyBrowser, 400);
      return;
    }
    rhymeLoadStartedAt = null;
    const wrap = document.createElement("div");
    wrap.className = "family-list";
    window.RHYME_DATA.F.forEach(fam=>{
      const b = document.createElement("button");
      b.className = "family-item";
      const label = fam.s && fam.s.length ? fam.s.join(", ") : fam.k;
      b.innerHTML = `<span>${label}…</span><span class="fam-count">${fam.n} words</span>`;
      b.addEventListener("click", ()=>{
        const words = wordsForFamily(fam.k);
        results.innerHTML = "";
        renderRhymeGroup(results, `Words rhyming like "${label}"`, words, "No words found.");
      });
      wrap.appendChild(b);
    });
    results.appendChild(wrap);
  }

  function initRhymesPaneOnce(){
    if(rhymesPaneInited) return;
    rhymesPaneInited = true;
    const searchInput = document.getElementById("rhymeSearch");
    let debounce = null;
    searchInput.addEventListener("input", ()=>{
      clearTimeout(debounce);
      debounce = setTimeout(()=>runRhymeSearch(searchInput.value), 200);
    });
    document.getElementById("rhymeBrowseBtn").addEventListener("click", ()=>{
      searchInput.value = "";
      renderFamilyBrowser();
    });
    document.getElementById("rhymeResults").innerHTML = `<div class="rhyme-status">Type a word above, or tap "Browse rhyme families" to explore without searching.</div>`;
  }

  // ================= SYNONYM THESAURUS (offline, WordNet-based, ~113k words) =================
  let synonymsPaneInited = false;
  let synLoadStartedAt = null;
  const POS_LABELS = { n: "Noun", v: "Verb", a: "Adjective", r: "Adverb" };

  function synFailedHTML(){
    return `<div class="rhyme-status">Couldn't load the synonym dictionary (synonyms.js). It may be missing from your hosting, misnamed, or your connection is too slow.<br><br><button id="synRetryBtn">Retry</button></div>`;
  }

  function renderSynonymGroup(container, posKey, words){
    if(!words || words.length===0) return;
    const wrap = document.createElement("div");
    wrap.className = "rhyme-group";
    wrap.innerHTML = `<h4><span class="pos-label">${POS_LABELS[posKey]}</span>(${words.length})</h4>`;
    const chips = document.createElement("div");
    chips.className = "rhyme-chips";
    words.forEach(w=>{
      const chip = document.createElement("button");
      chip.className = "rhyme-chip";
      chip.textContent = w;
      chip.title = "Tap to add to current section's lyrics";
      chip.addEventListener("click", ()=>insertWordIntoLyrics(w));
      chips.appendChild(chip);
    });
    wrap.appendChild(chips);
    container.appendChild(wrap);
  }

  function runSynonymSearch(query){
    const results = document.getElementById("synonymResults");
    results.innerHTML = "";
    if(!window.SYNONYM_DATA){
      if(synLoadStartedAt === null) synLoadStartedAt = Date.now();
      if(Date.now() - synLoadStartedAt > RHYME_LOAD_TIMEOUT_MS){
        results.innerHTML = synFailedHTML();
        const btn = document.getElementById("synRetryBtn");
        if(btn) btn.addEventListener("click", ()=>{ synLoadStartedAt = null; runSynonymSearch(query); });
        return;
      }
      results.innerHTML = `<div class="rhyme-status">Loading synonym dictionary…</div>`;
      setTimeout(()=>{ if(document.getElementById("synonymSearch").value.trim().toLowerCase()===query.trim().toLowerCase()) runSynonymSearch(query); }, 400);
      return;
    }
    synLoadStartedAt = null;
    const q = query.trim().toLowerCase();
    if(!q){ results.innerHTML = ""; return; }
    const entry = window.SYNONYM_DATA[q];
    if(!entry){
      results.innerHTML = `<div class="rhyme-status">No synonyms found for "${q}". Check the spelling, or try a simpler/base form of the word.</div>`;
      return;
    }
    ["n","v","a","r"].forEach(pos=>renderSynonymGroup(results, pos, entry[pos]));
  }

  function initSynonymsPaneOnce(){
    if(synonymsPaneInited) return;
    synonymsPaneInited = true;
    const searchInput = document.getElementById("synonymSearch");
    let debounce = null;
    searchInput.addEventListener("input", ()=>{
      clearTimeout(debounce);
      debounce = setTimeout(()=>runSynonymSearch(searchInput.value), 200);
    });
    document.getElementById("synonymResults").innerHTML = `<div class="rhyme-status">Type a word above to see its synonyms, grouped by part of speech.</div>`;
  }

  // ================= LIVE SYLLABLE COUNTER (per-line, offline) =================
  let syllableMap = null;
  function buildSyllableMapOnce(){
    if(syllableMap || !window.RHYME_DATA || !window.RHYME_DATA.S) return;
    syllableMap = new Map();
    const { W, S } = window.RHYME_DATA;
    for(let i=0;i<W.length;i++){ if(!syllableMap.has(W[i])) syllableMap.set(W[i], S[i]); }
  }
  function estimateSyllables(word){
    const w = word.toLowerCase();
    if(!w) return 0;
    let groups = w.match(/[aeiouy]+/g);
    let count = groups ? groups.length : 1;
    if(w.endsWith("e") && !w.endsWith("le") && count>1) count--;
    return Math.max(1, count);
  }
  function wordSyllables(word){
    buildSyllableMapOnce();
    const w = word.toLowerCase().replace(/[^a-z']/g,"");
    if(!w) return 0;
    if(syllableMap && syllableMap.has(w)) return syllableMap.get(w);
    return estimateSyllables(w);
  }
  function lineSyllables(line){
    const tokens = line.match(/[a-zA-Z']+/g);
    if(!tokens) return 0;
    return tokens.reduce((sum,t)=>sum + wordSyllables(t), 0);
  }

  function updateSyllableGutter(textareaEl, gutterEl){
    if(!textareaEl || !gutterEl) return;
    const cs = getComputedStyle(textareaEl);
    const lineHeight = parseFloat(cs.lineHeight) || 22;
    const paddingTop = parseFloat(cs.paddingTop) || 0;
    const lines = textareaEl.value.split("\n");
    gutterEl.style.paddingTop = paddingTop + "px";
    gutterEl.innerHTML = lines.map(line=>{
      const n = lineSyllables(line);
      return `<div class="sg-line" style="height:${lineHeight}px;line-height:${lineHeight}px;">${n>0?n:""}</div>`;
    }).join("");
    gutterEl.scrollTop = textareaEl.scrollTop;
  }

  // ---------- theme picker modal ----------
  document.getElementById("themeBtn").addEventListener("click", ()=>{
    const bg = document.createElement("div");
    bg.className = "modal-bg";
    const swatches = {dark:"#0f0f0f", light:"#ffffff", blue:"#16204a", green:"#132c1c", purple:"#271a38", slate:"#1f2428", amber:"#f7ecd0", rose:"#33161c", cyan:"#103038", teal:"#10332c", indigo:"#1a1d42"};
    bg.innerHTML = `<div class="modal"><h3>Theme</h3><div class="themegrid" id="themeList"></div></div>`;
    bg.addEventListener("click", (e)=>{ if(e.target===bg) bg.remove(); });
    document.body.appendChild(bg);
    const list = bg.querySelector("#themeList");
    THEMES.forEach(t=>{
      const b = document.createElement("button");
      b.innerHTML = `<span class="themeswatch" style="background:${swatches[t]}"></span>${t.charAt(0).toUpperCase()+t.slice(1)}`;
      b.addEventListener("click", ()=>{ applyTheme(t); bg.remove(); });
      list.appendChild(b);
    });
  });

  // ================= GOOGLE SIGN-IN + DRIVE SYNC =================
  const CLIENT_ID_KEY = "notepad_google_client_id";
  const DRIVE_FILE_NAME = "notepad-app-data.json";
  const DRIVE_SCOPE = "https://www.googleapis.com/auth/drive.file";

  let accessToken = null;
  let driveFileId = null;
  let tokenClient = null;
  let cloudSyncTimer = null;

  function getClientId(){ return localStorage.getItem(CLIENT_ID_KEY) || ""; }
  function isSignedIn(){ return !!accessToken; }

  function setSyncUI(state, text){
    const dot = document.getElementById("syncDot");
    const txt = document.getElementById("syncText");
    dot.className = "sync-dot" + (state ? " " + state : "");
    txt.textContent = text;
  }

  function initGis(){
    const clientId = getClientId();
    if(!clientId || !window.google || !google.accounts || !google.accounts.oauth2){
      setSyncUI("", "Offline");
      return;
    }
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: clientId,
      scope: DRIVE_SCOPE,
      callback: async (resp)=>{
        if(resp.error){ setSyncUI("err", "Sign-in failed"); return; }
        accessToken = resp.access_token;
        localStorage.setItem("notepad_was_signed_in", "1");
        updateAuthUI(true);
        await fetchUserInfo();
        await runFullSync();
      }
    });
    if(localStorage.getItem("notepad_was_signed_in") === "1"){
      try{ tokenClient.requestAccessToken({ prompt: "none" }); }
      catch(e){ setSyncUI("", "Offline"); }
    } else {
      setSyncUI("", "Offline");
    }
  }

  async function fetchUserInfo(){
    try{
      const res = await fetch("https://www.googleapis.com/oauth2/v2/userinfo", {
        headers: { Authorization: "Bearer " + accessToken }
      });
      if(!res.ok) return;
      const info = await res.json();
      if(info.picture){ document.getElementById("userAvatar").src = info.picture; }
    }catch(e){ /* non-fatal */ }
  }

  document.getElementById("signInBtn").addEventListener("click", ()=>{
    const clientId = getClientId();
    if(!clientId){
      alert("Add your Google Client ID first via the settings (gear) button.");
      openSettings();
      return;
    }
    if(!tokenClient) initGis();
    tokenClient.requestAccessToken({ prompt: "consent" });
  });

  document.getElementById("signOutBtn").addEventListener("click", ()=>{
    if(!confirm("Sign out of Google? Your songs stay saved on this device.")) return;
    if(accessToken && window.google && google.accounts && google.accounts.oauth2){
      google.accounts.oauth2.revoke(accessToken, ()=>{});
    }
    accessToken = null;
    driveFileId = null;
    localStorage.removeItem("notepad_was_signed_in");
    updateAuthUI(false);
    setSyncUI("", "Offline");
  });

  function updateAuthUI(signedIn){
    document.getElementById("signInBtn").classList.toggle("hidden", signedIn);
    document.getElementById("signOutBtn").classList.toggle("hidden", !signedIn);
  }

  async function driveFindFile(){
    const q = encodeURIComponent(`name='${DRIVE_FILE_NAME}' and trashed=false`);
    const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&spaces=drive&fields=files(id,name,modifiedTime)`, {
      headers: { Authorization: "Bearer " + accessToken }
    });
    if(!res.ok) throw new Error("Drive list failed: " + res.status);
    const data = await res.json();
    return (data.files && data.files[0]) || null;
  }

  async function driveCreateFile(content){
    const boundary = "notepadbound" + Date.now();
    const metadata = { name: DRIVE_FILE_NAME, mimeType: "application/json" };
    const body =
      `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n` +
      `--${boundary}\r\nContent-Type: application/json\r\n\r\n${content}\r\n` +
      `--${boundary}--`;
    const res = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id", {
      method: "POST",
      headers: { Authorization: "Bearer " + accessToken, "Content-Type": `multipart/related; boundary=${boundary}` },
      body
    });
    if(!res.ok) throw new Error("Drive create failed: " + res.status);
    const data = await res.json();
    return data.id;
  }

  async function driveUpdateFile(fileId, content){
    const res = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
      method: "PATCH",
      headers: { Authorization: "Bearer " + accessToken, "Content-Type": "application/json" },
      body: content
    });
    if(!res.ok) throw new Error("Drive update failed: " + res.status);
  }

  async function driveGetContent(fileId){
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
      headers: { Authorization: "Bearer " + accessToken }
    });
    if(!res.ok) throw new Error("Drive get failed: " + res.status);
    return res.text();
  }

  function mergeSongs(localList, remoteList){
    const map = new Map();
    localList.forEach(s=>map.set(s.id, s));
    remoteList.forEach(r=>{
      const l = map.get(r.id);
      if(!l || (r.updatedAt||0) > (l.updatedAt||0)) map.set(r.id, r);
    });
    return Array.from(map.values());
  }

  async function runFullSync(){
    if(!isSignedIn()) return;
    setSyncUI("busy", "Syncing…");
    try{
      let file = await driveFindFile();
      if(!file){
        driveFileId = await driveCreateFile(JSON.stringify({songs}));
      } else {
        driveFileId = file.id;
        const remoteText = await driveGetContent(driveFileId);
        let remoteSongs = [];
        try{ remoteSongs = (JSON.parse(remoteText).songs) || []; }catch(e){ remoteSongs = []; }
        songs = mergeSongs(songs, remoteSongs);
        persist();
        renderHome();
        if(currentSongId) renderEditor();
        await driveUpdateFile(driveFileId, JSON.stringify({songs}));
      }
      setSyncUI("ok", "Synced " + new Date().toLocaleTimeString());
    }catch(e){
      console.error(e);
      setSyncUI("err", "Sync error");
    }
  }

  function scheduleCloudSync(){
    if(!isSignedIn()) return;
    setSyncUI("busy", "Syncing…");
    clearTimeout(cloudSyncTimer);
    cloudSyncTimer = setTimeout(async ()=>{
      try{
        if(!driveFileId){
          const file = await driveFindFile();
          driveFileId = file ? file.id : await driveCreateFile(JSON.stringify({songs}));
          if(file) await driveUpdateFile(driveFileId, JSON.stringify({songs}));
        } else {
          await driveUpdateFile(driveFileId, JSON.stringify({songs}));
        }
        setSyncUI("ok", "Synced " + new Date().toLocaleTimeString());
      }catch(e){
        console.error(e);
        setSyncUI("err", "Sync error — will retry");
      }
    }, 1200);
  }

  function openSettings(){
    const bg = document.createElement("div");
    bg.className = "modal-bg";
    bg.innerHTML = `
      <div class="modal">
        <h3>Google Sync Settings</h3>
        <div class="settings-field">
          <label>Google OAuth Client ID</label>
          <input id="clientIdInput" placeholder="xxxxxxxx.apps.googleusercontent.com" value="${getClientId().replace(/"/g,'&quot;')}">
          <div class="settings-note">Create this in Google Cloud Console → APIs &amp; Services → Credentials. The app must be hosted at a real URL (not a local file) that's added as an Authorized JavaScript origin.</div>
        </div>
        <div class="row"><button id="saveClientId">Save</button></div>
      </div>`;
    bg.addEventListener("click",(e)=>{ if(e.target===bg) bg.remove(); });
    document.body.appendChild(bg);
    bg.querySelector("#saveClientId").addEventListener("click", ()=>{
      const val = bg.querySelector("#clientIdInput").value.trim();
      localStorage.setItem(CLIENT_ID_KEY, val);
      bg.remove();
      initGis();
    });
  }
  document.getElementById("settingsBtn").addEventListener("click", openSettings);

  // ---------- init ----------
  renderHome();
  updateAuthUI(false);
  window.addEventListener("load", ()=>{
    setTimeout(initGis, 300);
  });
  // in case load already fired before this script ran
  if(document.readyState === "complete"){ setTimeout(initGis, 300); }

})();
</script>
</body>
</html>
